name = "python-ai-training-platform"
main = "worker.ts"
compatibility_date = "2024-04-16"
compatibility_flags = ["nodejs_compat"]

[vars]
# 这些环境变量需要在 Cloudflare 控制台中设置
# CLOUDFLARE_ACCOUNT_ID = "your-account-id"
# AI_GATEWAY_NAME = "your-gateway-name"
# AI_API_KEY = "your-api-key"

[[kv_namespaces]]
binding = "PYTHON_AI_TRAINING_KV"
# id = "your-kv-namespace-id" # 需要在 Cloudflare 控制台中创建并获取

[build]
command = "npx esbuild worker.ts --bundle --outfile=dist/worker.js --platform=node"
directory = "dist"

[env.production]
name = "python-ai-training-platform-production"
[[env.production.kv_namespaces]]
binding = "PYTHON_AI_TRAINING_KV"
# id = "your-production-kv-namespace-id"

[env.development]
name = "python-ai-training-platform-dev"
[[env.development.kv_namespaces]]
binding = "PYTHON_AI_TRAINING_KV"
# id = "your-development-kv-namespace-id"
